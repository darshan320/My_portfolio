<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Contact</title>
    <style>
        /* Reusing global styles for consistency */
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #38bdf8;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --nav-bg: rgba(15, 23, 42, 0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); line-height: 1.6; padding-top: 80px; }
        
        nav { position: fixed; top: 0; width: 100%; background-color: var(--nav-bg); backdrop-filter: blur(10px); display: flex; justify-content: space-between; align-items: center; padding: 1.5rem 10%; z-index: 1000; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .logo { font-size: 1.5rem; font-weight: 700; color: var(--text-main); text-decoration: none; }
        .logo span { color: var(--accent-color); }
        .nav-links { display: flex; list-style: none; gap: 2rem; }
        .nav-links a { color: var(--text-muted); text-decoration: none; font-weight: 500; transition: color 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: var(--accent-color); }

        /* Contact Layout */
        .contact-container {
            max-width: 650px;
            margin: 5rem auto;
            padding: 0 5%;
            text-align: center;
        }

        .section-title {
            font-size: 2rem;
            margin-bottom: 1rem;
            position: relative;
            display: inline-block;
        }

        .section-title::after {
            content: '';
            position: absolute;
            left: 25%;
            bottom: -10px;
            width: 50%;
            height: 4px;
            background-color: var(--accent-color);
        }

        .contact-subtitle {
            color: var(--text-muted);
            margin-top: 1.5rem;
            margin-bottom: 3rem;
            font-size: 1.1rem;
        }

        /* Form Styling */
        form {
            background-color: var(--card-bg);
            padding: 2.5rem;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            text-align: left;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-main);
            font-size: 0.9rem;
            font-weight: 500;
        }

        input, textarea {
            width: 100%;
            padding: 0.8rem;
            background-color: var(--bg-color);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            color: var(--text-main);
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        .submit-btn {
            width: 100%;
            padding: 0.9rem;
            background-color: var(--accent-color);
            color: var(--bg-color);
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(56, 189, 248, 0.3);
        }

        footer { text-align: center; padding: 3rem 10%; color: var(--text-muted); border-top: 1px solid rgba(255, 255, 255, 0.05); font-size: 0.9rem; margin-top: 5rem;}
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">Dev<span>.</span></a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
    </nav>

    <main class="contact-container">
        <h2 class="section-title">Get In Touch</h2>
        <p class="contact-subtitle">Whether you have a question, want to talk about a project collaboration, or just want to connect, feel free to drop a message!</p>
        
        <form action="#" method="POST" onsubmit="event.preventDefault(); alert('Form submitted! Connect a back-end handler or Formspree to make this functional.');">
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" required placeholder="John Doe">
            </div>
            <div class="form-group">
                <label for="email">Contact number</label>
                <input type="" id="" required placeholder="0000000000">
            </div>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" required placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" required placeholder="Your message here..."></textarea>
            </div>
            <button type="submit" class="submit-btn">Send Message</button>
        </form>
    </main>

    <footer>
        <p>&copy; 2026 Your Name. Built from scratch with passion.</p>
    </footer>

</body>
</html>
